<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="theme-color" content="#1a1b23">
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.firebaseapp.com https://apis.google.com https://*.facebook.net https://*.facebook.com https://*.googletagmanager.com https://*.mapbox.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.mapbox.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com https://*.mapbox.com https://*.facebook.com https://*.google-analytics.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.open-meteo.com https://geocoding-api.open-meteo.com https://*.mapbox.com https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://*.facebook.com https://*.facebook.net https://*.sigencloud.com https://us-central1-solar-forecaster-63320.cloudfunctions.net https://europe-west1-solar-forecaster-63320.cloudfunctions.net https://solarcaster.ai https://www.solarcaster.ai; frame-src 'self' https://solarcaster.ai https://www.solarcaster.ai https://*.firebaseapp.com https://solar-forecaster-63320--staging-0lu1kapg.web.app https://*.facebook.com;">
    <title>solarcaster</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-display" style="display:none; color: white; background: #991b1b; padding: 20px; font-family: monospace; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
      <h2 style="margin-top: 0;">Runtime Error Detected:</h2>
      <pre id="error-message" style="white-space: pre-wrap; word-break: break-all;"></pre>
      <button onclick="location.reload()" style="background: white; color: black; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Reload Page</button>
    </div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        // SILENCE: Ignore generic cross-origin "Script error." which usually comes from trackers (FB/GA)
        if (message === "Script error." || !source || lineno === 0) return false;

        const display = document.getElementById('error-display');
        const msg = document.getElementById('error-message');
        if (display && msg) {
          display.style.display = 'block';
          msg.textContent = (message || "Unknown Script Error") + '\n\nSource: ' + (source || "Unknown") + '\nLine: ' + lineno + '\n\n' + (error ? error.stack : '');
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        const display = document.getElementById('error-display');
        const msg = document.getElementById('error-message');
        if (display && msg) {
          display.style.display = 'block';
          msg.textContent = 'Unhandled Rejection: ' + event.reason;
        }
      };
    </script>
    <script type="module" crossorigin src="/src/main.jsx"></script>
  </body>
</html>
